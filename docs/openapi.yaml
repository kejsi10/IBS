  /documents/upload:
    post:
      tags:
        - Documents
      summary: Upload a document
      description: Uploads a file with associated metadata. Returns the new document ID.
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - entityType
                - category
              properties:
                file:
                  type: string
                  format: binary
                entityType:
                  $ref: '#/components/schemas/DocumentEntityType'
                category:
                  $ref: '#/components/schemas/DocumentCategory'
                entityId:
                  type: string
                  format: uuid
                  description: Optional ID of the linked entity (policy, client, claim, carrier)
                description:
                  type: string
                  maxLength: 1000
      responses:
        '201':
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

