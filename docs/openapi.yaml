        status:
          type: string
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        middleName:
          type: string
          nullable: true
        suffix:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
        businessName:
          type: string
          nullable: true
        businessType:
          type: string
          nullable: true
        dbaName:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
        yearEstablished:
          type: integer
          nullable: true
        numberOfEmployees:
          type: integer
          nullable: true
        annualRevenue:
          type: number
          format: decimal
          nullable: true
        website:
          type: string
          nullable: true
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/ContactDto'
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/AddressDto'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    ContactDto:
