openapi: 3.0.3
info:
  title: Insurance Broker System (IBS) API
  description: |
    RESTful API for the Insurance Broker System - a multi-tenant insurance agency management platform.

    ## Authentication
    All endpoints (except authentication) require a valid JWT Bearer token obtained via the `/auth/login` endpoint.

    ## Multi-Tenancy
    The system is multi-tenant. Tenant context is determined from the JWT token claims.

    ## Error Responses
    All error responses follow a consistent format with an `error` field containing the error message.
  version: 1.0.0
  contact:
    name: IBS API Support
  license:
    name: Proprietary

servers:
  - url: https://localhost:7001/api/v1
    description: Development server
  - url: https://api.ibs.example.com/api/v1
    description: Production server

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Carriers
    description: Insurance carrier management
  - name: Clients
    description: Client/CRM management
  - name: Policies
    description: Policy lifecycle management
  - name: Coverages
    description: Policy coverage management
  - name: Endorsements
    description: Policy endorsement workflow
  - name: Quotes
    description: Quote request and carrier response management
  - name: Commission Schedules
    description: Commission schedule management
  - name: Commission Statements
    description: Commission statement and line item management
  - name: Commission Reports
    description: Commission statistics and reporting
  - name: Documents
    description: Document storage, categorization, and download management
  - name: Document Templates
    description: Handlebars HTML template management for document generation (COI, Policy Summary)
  - name: COI Generation
    description: Certificate of Insurance PDF generation from templates and live policy data

security:
  - bearerAuth: []

paths:
  # ============================================
  # Authentication Endpoints
  # ============================================
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate user
      description: Authenticates a user and returns JWT access and refresh tokens.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Exchanges a valid refresh token for a new access token.
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Invalidates the current refresh token.
      operationId: logout
      responses:
        '204':
          description: Successfully logged out
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: Sends a password reset email to the specified address.
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '204':
          description: Password reset email sent (if account exists)

  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password
      description: Resets the user's password using a valid reset token.
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Password reset successfully
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      description: Returns the authenticated user's profile information.
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================
  # Carrier Endpoints
  # ============================================
  /carriers:
    get:
      tags:
        - Carriers
      summary: List all carriers
      description: Returns all carriers for the current tenant.
      operationId: getCarriers
      responses:
        '200':
          description: List of carriers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CarrierSummaryDto'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Carriers
      summary: Create a carrier
      description: Creates a new insurance carrier.
      operationId: createCarrier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCarrierRequest'
      responses:
        '201':
          description: Carrier created successfully
          headers:
            Location:
              description: URL of the created carrier
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Carrier code already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /carriers/{id}:
    get:
      tags:
        - Carriers
      summary: Get carrier by ID
      description: Returns a specific carrier with full details.
      operationId: getCarrierById
      parameters:
        - $ref: '#/components/parameters/CarrierId'
      responses:
        '200':
          description: Carrier details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarrierDto'
        '404':
          description: Carrier not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Carriers
      summary: Update carrier
      description: Updates an existing carrier's information.
      operationId: updateCarrier
      parameters:
        - $ref: '#/components/parameters/CarrierId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCarrierRequest'
      responses:
        '204':
          description: Carrier updated successfully
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Carrier not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /carriers/{id}/deactivate:
    post:
      tags:
        - Carriers
      summary: Deactivate carrier
      description: Deactivates a carrier, preventing new policies.
      operationId: deactivateCarrier
      parameters:
        - $ref: '#/components/parameters/CarrierId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeactivateCarrierRequest'
      responses:
        '204':
          description: Carrier deactivated successfully
        '404':
          description: Carrier not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /carriers/{id}/products:
    post:
      tags:
        - Carriers
      summary: Add product to carrier
      description: Adds a new insurance product to a carrier's catalog.
      operationId: addProduct
      parameters:
        - $ref: '#/components/parameters/CarrierId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProductRequest'
      responses:
        '201':
          description: Product added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Carrier not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Product code already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /carriers/{id}/appetites:
    post:
      tags:
        - Carriers
      summary: Add appetite rule to carrier
      description: Adds an appetite rule defining what risks the carrier accepts.
      operationId: addAppetite
      parameters:
        - $ref: '#/components/parameters/CarrierId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAppetiteRequest'
      responses:
        '201':
          description: Appetite rule added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Carrier not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /carriers/status/{status}:
    get:
      tags:
        - Carriers
      summary: Get carriers by status
      description: Returns carriers filtered by status.
      operationId: getCarriersByStatus
      parameters:
        - name: status
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/CarrierStatus'
      responses:
        '200':
          description: List of carriers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CarrierSummaryDto'

  /carriers/search:
    get:
      tags:
        - Carriers
      summary: Search carriers
      description: Searches carriers by name or code.
      operationId: searchCarriers
      parameters:
        - name: searchTerm
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CarrierSummaryDto'

  # ============================================
  # Client Endpoints
  # ============================================
  /clients:
    get:
      tags:
        - Clients
      summary: List clients
      description: Returns a paginated list of clients with optional search.
      operationId: getClients
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
          description: Search by name, email, or phone
      responses:
        '200':
          description: Paginated list of clients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientListResult'

  /clients/{id}:
    get:
      tags:
        - Clients
      summary: Get client by ID
      description: Returns a specific client with full details.
      operationId: getClientById
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Client details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDto'
        '404':
          description: Client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Clients
      summary: Update client
      description: Updates an existing client's information.
      operationId: updateClient
      parameters:
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '204':
          description: Client updated successfully
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clients/{id}/deactivate:
    post:
      tags:
        - Clients
      summary: Deactivate client
      description: Soft-deletes a client by setting their status to inactive.
      operationId: deactivateClient
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '204':
          description: Client deactivated successfully
        '404':
          description: Client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clients/individual:
    post:
      tags:
        - Clients
      summary: Create individual client
      description: Creates a new individual (person) client.
      operationId: createIndividualClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIndividualClientRequest'
      responses:
        '201':
          description: Client created successfully
          headers:
            Location:
              description: URL of the created client
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clients/business:
    post:
      tags:
        - Clients
      summary: Create business client
      description: Creates a new business (company) client.
      operationId: createBusinessClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBusinessClientRequest'
      responses:
        '201':
          description: Client created successfully
          headers:
            Location:
              description: URL of the created client
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clients/{clientId}/policies:
    get:
      tags:
        - Policies
      summary: Get policies by client
      description: Returns all policies for a specific client.
      operationId: getPoliciesByClient
      parameters:
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDirection'
      responses:
        '200':
          description: List of client policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyListResult'

  # ============================================
  # Policy Endpoints
  # ============================================
  /policies:
    get:
      tags:
        - Policies
      summary: List policies
      description: Returns a paginated list of policies with filtering options.
      operationId: getPolicies
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by policy number
        - name: clientId
          in: query
          schema:
            type: string
            format: uuid
        - name: carrierId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PolicyStatus'
        - name: lineOfBusiness
          in: query
          schema:
            $ref: '#/components/schemas/LineOfBusiness'
        - name: effectiveDateFrom
          in: query
          schema:
            type: string
            format: date
        - name: effectiveDateTo
          in: query
          schema:
            type: string
            format: date
        - name: expirationDateFrom
          in: query
          schema:
            type: string
            format: date
        - name: expirationDateTo
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDirection'
      responses:
        '200':
          description: Paginated list of policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyListResult'

    post:
      tags:
        - Policies
      summary: Create policy
      description: Creates a new insurance policy in Draft status.
      operationId: createPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
      responses:
        '201':
          description: Policy created successfully
          headers:
            Location:
              description: URL of the created policy
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policies/{id}:
    get:
      tags:
        - Policies
      summary: Get policy by ID
      description: Returns a specific policy with full details including coverages and endorsements.
      operationId: getPolicyById
      parameters:
        - $ref: '#/components/parameters/PolicyId'
      responses:
        '200':
          description: Policy details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyDto'
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policies/{id}/bind:
    post:
      tags:
        - Policies
      summary: Bind policy
      description: Binds a draft policy, committing to the coverage. Requires at least one coverage.
      operationId: bindPolicy
      parameters:
        - $ref: '#/components/parameters/PolicyId'
      responses:
        '204':
          description: Policy bound successfully
        '400':
          description: Policy cannot be bound (wrong status or no coverages)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policies/{id}/activate:
    post:
      tags:
        - Policies
      summary: Activate policy
      description: Activates (issues) a bound policy, making it effective.
      operationId: activatePolicy
      parameters:
        - $ref: '#/components/parameters/PolicyId'
      responses:
        '204':
          description: Policy activated successfully
        '400':
          description: Policy cannot be activated (must be in Bound status)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policies/{id}/cancel:
    post:
      tags:
        - Policies
      summary: Cancel policy
      description: Cancels a policy with a specified reason and cancellation date.
      operationId: cancelPolicy
      parameters:
        - $ref: '#/components/parameters/PolicyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelPolicyRequest'
      responses:
        '204':
          description: Policy cancelled successfully
        '400':
          description: Policy cannot be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policies/{id}/renew:
    post:
      tags:
        - Policies
      summary: Renew policy
      description: Creates a renewal policy from an existing active policy, copying all coverages.
      operationId: renewPolicy
      parameters:
        - $ref: '#/components/parameters/PolicyId'
      responses:
        '201':
          description: Renewal policy created successfully
          headers:
            Location:
              description: URL of the renewal policy
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: ID of the new renewal policy
        '400':
          description: Policy cannot be renewed (must be Active or PendingRenewal)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policies/{id}/coverages:
    post:
      tags:
        - Coverages
      summary: Add coverage to policy
      description: Adds a new coverage to a draft policy.
      operationId: addCoverage
      parameters:
        - $ref: '#/components/parameters/PolicyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCoverageRequest'
      responses:
        '201':
          description: Coverage added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '400':
          description: Invalid request or policy not in Draft status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policies/{id}/coverages/{coverageId}:
    put:
      tags:
        - Coverages
      summary: Update coverage
      description: Updates an existing coverage on a draft policy.
      operationId: updateCoverage
      parameters:
        - $ref: '#/components/parameters/PolicyId'
        - $ref: '#/components/parameters/CoverageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCoverageRequest'
      responses:
        '204':
          description: Coverage updated successfully
        '400':
          description: Invalid request or policy not in Draft status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy or coverage not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Coverages
      summary: Remove coverage
      description: Removes (deactivates) a coverage from a draft policy.
      operationId: removeCoverage
      parameters:
        - $ref: '#/components/parameters/PolicyId'
        - $ref: '#/components/parameters/CoverageId'
      responses:
        '204':
          description: Coverage removed successfully
        '400':
          description: Policy not in Draft status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy or coverage not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policies/{id}/endorsements:
    post:
      tags:
        - Endorsements
      summary: Add endorsement
      description: Adds a new endorsement to an active policy.
      operationId: addEndorsement
      parameters:
        - $ref: '#/components/parameters/PolicyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddEndorsementRequest'
      responses:
        '201':
          description: Endorsement added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '400':
          description: Invalid request or endorsement date outside policy period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policies/{id}/endorsements/{endorsementId}/approve:
    post:
      tags:
        - Endorsements
      summary: Approve endorsement
      description: Approves a pending endorsement.
      operationId: approveEndorsement
      parameters:
        - $ref: '#/components/parameters/PolicyId'
        - $ref: '#/components/parameters/EndorsementId'
      responses:
        '204':
