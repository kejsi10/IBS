        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    ClientDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
