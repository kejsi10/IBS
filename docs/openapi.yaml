          enum: [Mailing, Physical, Billing]
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
        isPrimary:
          type: boolean

    CreateIndividualClientRequest:
      type: object
      required:
