        - lastName
      properties:
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        middleName:
          type: string
          maxLength: 100
        suffix:
          type: string
          maxLength: 20
        dateOfBirth:
          type: string
          format: date
        email:
          type: string
          format: email
        phone:
          type: string

    CreateBusinessClientRequest:
      type: object
      required:
        - businessName
        - businessType
      properties:
        businessName:
          type: string
          maxLength: 200
        businessType:
          type: string
          maxLength: 100
        dbaName:
          type: string
          maxLength: 200
        industry:
          type: string
          maxLength: 100
        yearEstablished:
          type: integer
        numberOfEmployees:
          type: integer
        annualRevenue:
          type: number
          format: decimal
        website:
          type: string
          format: uri
        email:
          type: string
          format: email
        phone:
          type: string

    UpdateClientRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        middleName:
          type: string
        suffix:
          type: string
        dateOfBirth:
          type: string
          format: date
        businessName:
          type: string
        businessType:
          type: string
        dbaName:
          type: string
        industry:
          type: string
        yearEstablished:
          type: integer
        numberOfEmployees:
          type: integer
        annualRevenue:
          type: number
          format: decimal
        website:
          type: string
          format: uri
        email:
          type: string
          format: email
