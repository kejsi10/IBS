    get:
      tags:
        - Documents
      summary: List documents
      description: Returns a paginated list of documents filtered by the provided parameters.
      operationId: listDocuments
      parameters:
        - name: searchTerm
          in: query
          schema:
            type: string
          description: Search by file name or description
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/DocumentCategory'
        - name: entityType
          in: query
          schema:
            $ref: '#/components/schemas/DocumentEntityType'
        - name: entityId
          in: query
          schema:
            type: string
            format: uuid
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated document list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentSearchResultDto'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{id}:
    get:
      tags:
        - Documents
      summary: Get document by ID
      operationId: getDocumentById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetailDto'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Documents
      summary: Archive a document
      description: Soft-deletes a document by marking it as archived.
      operationId: archiveDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Document archived successfully
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{id}/download:
    get:
      tags:
        - Documents
      summary: Download document
      description: Returns a redirect (302) to a temporary pre-signed SAS URL for the document blob.
      operationId: downloadDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '302':
          description: Redirect to pre-signed download URL
          headers:
            Location:
              schema:
                type: string
                format: uri
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================
  # Document Template Endpoints
  # ============================================
  /documents/templates:
    get:
      tags:
        - Document Templates
      summary: List document templates
      operationId: listDocumentTemplates
      parameters:
        - name: searchTerm
          in: query
          schema:
            type: string
        - name: templateType
          in: query
          schema:
            $ref: '#/components/schemas/TemplateType'
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated template list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentTemplateSearchResultDto'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Document Templates
      summary: Create document template
      operationId: createDocumentTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentTemplateRequest'
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/templates/{id}:
    get:
      tags:
        - Document Templates
      summary: Get template by ID
      operationId: getDocumentTemplateById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Template detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentTemplateDetailDto'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Document Templates
      summary: Update document template
      operationId: updateDocumentTemplate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentTemplateRequest'
      responses:
        '204':
          description: Template updated
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/templates/{id}/activate:
    post:
      tags:
        - Document Templates
      summary: Activate a template
      operationId: activateDocumentTemplate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Template activated
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/templates/{id}/deactivate:
    post:
      tags:
        - Document Templates
      summary: Deactivate a template
      operationId: deactivateDocumentTemplate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Template deactivated
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================
  # COI Generation Endpoints
  # ============================================
  /documents/generate-coi:
    post:
      tags:
        - COI Generation
      summary: Generate Certificate of Insurance
      description: |
        Renders the specified Handlebars template with live policy data from the database
        (client name, carrier name, coverages, broker name, etc.) using QuestPDF to produce
        a PDF, stores it in Azure Blob Storage, and returns the new document ID.
      operationId: generateCOI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateCOIRequest'
      responses:
        '201':
          description: COI generated and stored as a document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Template or policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /auth/login

  parameters:
    PolicyId:
      name: id
      in: path
      required: true
      description: Policy unique identifier
      schema:
        type: string
        format: uuid

    ClientId:
      name: clientId
      in: path
      required: true
      description: Client unique identifier
      schema:
        type: string
        format: uuid

    CarrierId:
      name: id
      in: path
      required: true
      description: Carrier unique identifier
      schema:
        type: string
        format: uuid

    CoverageId:
      name: coverageId
      in: path
      required: true
      description: Coverage unique identifier
      schema:
        type: string
        format: uuid

    EndorsementId:
      name: endorsementId
      in: path
      required: true
      description: Endorsement unique identifier
      schema:
        type: string
        format: uuid

    CommissionScheduleId:
      name: id
      in: path
      required: true
      description: Commission schedule unique identifier
      schema:
        type: string
        format: uuid

    CommissionStatementId:
      name: id
      in: path
      required: true
      description: Commission statement unique identifier
      schema:
        type: string
        format: uuid

    LineItemId:
      name: lineItemId
      in: path
      required: true
      description: Commission line item unique identifier
      schema:
        type: string
        format: uuid

    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1

    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        default: CreatedAt

    SortDirection:
      name: sortDirection
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  schemas:
    # ============================================
    # Common Schemas
    # ============================================
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message

    # ============================================
    # Authentication Schemas
    # ============================================
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        tenantId:
          type: string
          format: uuid

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Token expiration time in seconds
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        roles:
          type: array
          items:
            type: string

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        tenantId:
          type: string
          format: uuid

    ResetPasswordRequest:
      type: object
      required:
        - token
        - email
        - newPassword
        - confirmPassword
      properties:
        token:
          type: string
        email:
          type: string
          format: email
        newPassword:
          type: string
          format: password
        confirmPassword:
          type: string
          format: password
        tenantId:
          type: string
          format: uuid

    CurrentUserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        fullName:
          type: string
        title:
          type: string
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        isActive:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        roles:
          type: array
          items:
            type: string

    # ============================================
    # Carrier Schemas
    # ============================================
    CarrierStatus:
      type: string
      enum:
        - Active
        - Inactive
        - Suspended

    CarrierSummaryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        status:
          $ref: '#/components/schemas/CarrierStatus'
        amBestRating:
          type: string
          nullable: true

    CarrierDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        legalName:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/CarrierStatus'
        amBestRating:
          type: string
          nullable: true
        naicCode:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
        apiEndpoint:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductDto'
        appetites:
          type: array
          items:
            $ref: '#/components/schemas/AppetiteDto'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    ProductDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        lineOfBusiness:
          $ref: '#/components/schemas/LineOfBusiness'
        description:
          type: string
          nullable: true
        minimumPremium:
          type: number
          format: decimal
          nullable: true
        effectiveDate:
          type: string
          format: date
          nullable: true
        expirationDate:
          type: string
          format: date
          nullable: true
        isActive:
          type: boolean

    AppetiteDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        lineOfBusiness:
          $ref: '#/components/schemas/LineOfBusiness'
        states:
          type: string
        minYearsInBusiness:
          type: integer
          nullable: true
        maxYearsInBusiness:
          type: integer
          nullable: true
        minAnnualRevenue:
          type: number
          format: decimal
          nullable: true
        maxAnnualRevenue:
          type: number
          format: decimal
          nullable: true
        acceptedIndustries:
          type: string
          nullable: true
        excludedIndustries:
          type: string
          nullable: true
        isActive:
          type: boolean

    CreateCarrierRequest:
      type: object
      required:
        - name
        - code
      properties:
        name:
          type: string
          maxLength: 200
        code:
          type: string
          maxLength: 20
        legalName:
          type: string
          maxLength: 200
        amBestRating:
          type: string
        naicCode:
          type: string
        websiteUrl:
          type: string
          format: uri
        notes:
          type: string

    UpdateCarrierRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 200
        legalName:
          type: string
          maxLength: 200
        amBestRating:
          type: string
        naicCode:
          type: string
        websiteUrl:
          type: string
          format: uri
        apiEndpoint:
          type: string
          format: uri
        notes:
          type: string

    DeactivateCarrierRequest:
      type: object
      properties:
        reason:
          type: string

    AddProductRequest:
      type: object
      required:
        - name
        - code
        - lineOfBusiness
      properties:
        name:
          type: string
        code:
          type: string
        lineOfBusiness:
          $ref: '#/components/schemas/LineOfBusiness'
        description:
          type: string
        minimumPremium:
          type: number
          format: decimal
        effectiveDate:
          type: string
          format: date
        expirationDate:
          type: string
          format: date

    AddAppetiteRequest:
      type: object
      required:
        - lineOfBusiness
      properties:
        lineOfBusiness:
          $ref: '#/components/schemas/LineOfBusiness'
        states:
          type: string
          default: ALL
        minYearsInBusiness:
          type: integer
        maxYearsInBusiness:
          type: integer
        minAnnualRevenue:
          type: number
          format: decimal
        maxAnnualRevenue:
          type: number
          format: decimal
        minEmployees:
          type: integer
        maxEmployees:
          type: integer
        acceptedIndustries:
          type: string
        excludedIndustries:
          type: string
        notes:
          type: string

    # ============================================
    # Client Schemas
    # ============================================
    ClientListResult:
      type: object
      properties:
        clients:
          type: array
          items:
            $ref: '#/components/schemas/ClientSummaryDto'
        totalCount:
          type: integer
        pageNumber:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    ClientSummaryDto:
