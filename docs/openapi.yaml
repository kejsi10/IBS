          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        isPrimary:
          type: boolean

    AddressDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
