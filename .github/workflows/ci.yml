name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore IBS.sln

      - name: Build
        run: dotnet build IBS.sln --no-restore -c Release

      - name: Run unit tests
        run: >
          dotnet test tests/IBS.UnitTests/IBS.UnitTests.csproj
          --no-build -c Release
          --logger "trx;LogFileName=unit-test-results.trx"
          --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: test-results/unit-test-results.trx
          reporter: dotnet-trx

  frontend:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/IBS.Web/package-lock.json

      - name: Install dependencies
        working-directory: src/IBS.Web
        run: npm ci

      - name: Lint
        working-directory: src/IBS.Web
        run: npm run lint

      - name: Build
        working-directory: src/IBS.Web
        run: npm run build
        env:
          VITE_API_BASE_URL: https://placeholder.azurecontainerapps.io
